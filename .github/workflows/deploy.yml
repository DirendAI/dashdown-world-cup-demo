name: Deploy to GitHub Pages

on:
  # Rebuild and deploy on every push to the default branch.
  push:
    branches: [main]
  # Refresh the live data feed every 30 minutes (build fetches openfootball at build time).
  schedule:
    - cron: "*/30 * * * *"
  # Allow manually triggering a deploy from the Actions tab.
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dashdown
        # Pinned to match the version this project was authored against.
        run: pip install dashdown-md==0.1.5

      - name: Build static site
        # Pre-renders pages + fetches the live World Cup feed into query snapshots.
        # Pages use a relative <base>, so the site works under the repo subpath.
        run: dashdown build -o ./dist

      - name: Inject PostHog analytics
        # No-op unless the POSTHOG_KEY secret is set. (The project key is actually
        # public/write-only and ends up in the page source, but it's stored as a
        # secret here, which works fine for same-repo push/schedule/dispatch runs.)
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
        run: python .github/scripts/inject_posthog.py ./dist

      - name: Disable Jekyll
        # The output ships a `_dashdown/` dir; .nojekyll stops Pages from
        # stripping underscore-prefixed paths (belt-and-braces for the Actions flow).
        run: touch ./dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
